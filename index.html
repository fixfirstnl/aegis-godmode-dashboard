<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AEGIS Godmode v2.20 - Automated Trading System Dashboard">
<title>AEGIS Godmode v2.20 — Login</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-page">
<div class="auth-container">
  <div class="auth-logo">
    <svg class="logo-svg" viewBox="0 0 64 64" aria-hidden="true">
      <defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0ea5e9"/><stop offset="100%" style="stop-color:#10b981"/></linearGradient></defs>
      <path d="M32 2L4 14v18c0 18 12 34 28 38 16-4 28-20 28-38V14L32 2z" fill="url(#lg)" opacity="0.2"/>
      <path d="M32 8L10 17v15c0 15 9.5 28.5 22 32 12.5-3.5 22-17 22-32V17L32 8z" fill="none" stroke="url(#lg)" stroke-width="2"/>
      <circle cx="32" cy="30" r="8" fill="url(#lg)"/>
      <path d="M32 18v-6M32 48v-6M20 30h-6M44 30h6" stroke="url(#lg)" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <h1>AEGIS<span class="highlight">Godmode</span></h1>
    <p class="version">v2.20</p>
  </div>
  <form id="loginForm" class="auth-form" autocomplete="on">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter username">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter password">
    </div>
    <div class="form-group">
      <label class="checkbox-label">
        <input type="checkbox" id="demoMode" checked>
        <span>Demo Mode (no backend required)</span>
      </label>
    </div>
    <button type="submit" class="btn btn-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M10 17v-2H5.5A2.5 2.5 0 0 1 3 12.5v-1A2.5 2.5 0 0 1 5.5 9H10V7l6 5-6 5zM19 4h-6v2h6v12h-6v2h6a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/></svg>
      Login
    </button>
    <div id="loginError" class="error-message"></div>
  </form>
  <p class="auth-footer">Don't have an account? <a href="register.html">Register</a></p>
</div>
<script src="assets/js/auth.js"></script>
</body>
</html>
