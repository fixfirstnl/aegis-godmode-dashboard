<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEGIS Godmode v2.20 — Register</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-page">
<div class="auth-container">
  <div class="auth-logo">
    <svg class="logo-svg" viewBox="0 0 64 64" aria-hidden="true">
      <defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0ea5e9"/><stop offset="100%" style="stop-color:#10b981"/></linearGradient></defs>
      <path d="M32 2L4 14v18c0 18 12 34 28 38 16-4 28-20 28-38V14L32 2z" fill="url(#lg)" opacity="0.2"/>
      <path d="M32 8L10 17v15c0 15 9.5 28.5 22 32 12.5-3.5 22-17 22-32V17L32 8z" fill="none" stroke="url(#lg)" stroke-width="2"/>
      <circle cx="32" cy="30" r="8" fill="url(#lg)"/>
    </svg>
    <h1>AEGIS<span class="highlight">Godmode</span></h1>
    <p class="version">v2.20</p>
  </div>
  <form id="registerForm" class="auth-form" autocomplete="on">
    <div class="form-group">
      <label for="regUsername">Username</label>
      <input type="text" id="regUsername" name="username" required autocomplete="username" placeholder="Choose username">
    </div>
    <div class="form-group">
      <label for="regEmail">Email</label>
      <input type="email" id="regEmail" name="email" required autocomplete="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label for="regPassword">Password</label>
      <input type="password" id="regPassword" name="password" required autocomplete="new-password" placeholder="Min 8 characters">
    </div>
    <div class="form-group">
      <label for="regPassword2">Confirm Password</label>
      <input type="password" id="regPassword2" name="password2" required autocomplete="new-password" placeholder="Repeat password">
    </div>
    <button type="submit" class="btn btn-primary">Create Account</button>
    <div id="registerError" class="error-message"></div>
  </form>
  <p class="auth-footer">Already have an account? <a href="index.html">Login</a></p>
</div>
<script src="assets/js/auth.js"></script>
</body>
</html>
